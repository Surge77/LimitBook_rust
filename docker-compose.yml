# Run the LimitBook gateway + frontend together.
#   docker compose up --build
# Then open http://localhost:3000
#
# NOTE: authored but not validated locally (Docker is not installed on the dev machine).
services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    environment:
      LIMITBOOK_BIND: 0.0.0.0:8080
      RUST_LOG: gateway=info
    expose:
      - "8080"
    ports:
      - "8080:8080" # exposed for direct REST/metrics access
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - gateway
    ports:
      - "3000:80"
    restart: unless-stopped
